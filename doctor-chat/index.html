<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Halcyon Care — Chats</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app">
  <nav class="rail">
    <div class="rail-mark" title="Collapse">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2L4.5 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <button class="rail-btn" title="Workspace">
      <svg width="19" height="19" viewBox="0 0 20 20" fill="none"><path d="M3 8.5L10 3l7 5.5V17a1 1 0 0 1-1 1h-4v-5H8v5H4a1 1 0 0 1-1-1V8.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
    <button class="rail-btn" title="Insights">
      <svg width="19" height="19" viewBox="0 0 20 20" fill="none"><path d="M10 2v2M10 16v2M4 4l1.4 1.4M14.6 14.6L16 16M2 10h2M16 10h2M4 16l1.4-1.4M14.6 5.4L16 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.4"/></svg>
    </button>
    <button class="rail-btn" title="Records">
      <svg width="19" height="19" viewBox="0 0 20 20" fill="none"><path d="M5 2.5h7l3 3V17a.5.5 0 0 1-.5.5h-9A.5.5 0 0 1 5 17V2.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M7.5 9h5M7.5 12h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button class="rail-btn active" title="Chats">
      <svg width="19" height="19" viewBox="0 0 20 20" fill="none"><path d="M3 4.5h14a1 1 0 0 1 1 1V13a1 1 0 0 1-1 1H8l-4 3.2V14H3a1 1 0 0 1-1-1V5.5a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
  </nav>

  <div class="content-wrapper">
    <header class="topbar">
    <div style="display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 0;">
      <button class="back-btn" id="backBtn" title="Back to chats" style="align-self: flex-start; width: 36px; height: 36px;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3.5L5 8l5 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="breadcrumb">
        <img src="assets/Synthio Logo.svg" alt="Synthio Labs" class="breadcrumb-logo" />
        <span>Synthio Labs</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        <span>NASP for Refractory Gout</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        <span class="current">Chats</span>
      </div>
      <h1 style="font-family: var(--heading); font-weight: 500; font-size: 40px; letter-spacing: -0.01em; color: var(--ink); line-height: 1.2; margin: 0;">Chats</h1>
    </div>
    <div class="topbar-actions">
      <button class="download-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5v8M4 6.5L7 9.5l3-3M2 11.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="dl-label">Download Report</span>
      </button>
      <div class="user-chip">
        <div class="avatar">TD</div>
        <span class="user-name">Tushar</span>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </header>

  <div class="content-area">
    <section class="chat-list-panel">
      <ul class="doctor-list" id="doctorList"></ul>
    </section>

    <main class="main">
    <div class="main-scroll" id="mainScroll">
      <div class="main-content">
        <div class="profile-head">
          <div class="profile-name-section">
            <div class="profile-avatar">
              <img id="profileAvatarImg" alt="" style="display:none" />
              <div id="profileAvatarFallback"></div>
            </div>
            <h2 id="peerName"></h2>
          </div>
          <div class="profile-actions">
            <button class="circle-btn info-show-btn" id="infoShowBtn" title="Show info" style="display: none;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </button>
            <button class="circle-btn" title="Video visit">
              <svg width="17" height="17" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="11" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M13 8.5L18 5.5v9L13 11.5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
            <button class="circle-btn" title="Voice call">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4.5 2.5c.5-.5 1.3-.5 1.8 0l2.1 2.1c.5.5.5 1.3 0 1.8l-1.1 1.1a.6.6 0 0 0-.1.7 12 12 0 0 0 4.8 4.8c.2.1.5.1.7-.1l1.1-1.1c.5-.5 1.3-.5 1.8 0l2.1 2.1c.5.5.5 1.3 0 1.8l-1.2 1.2c-.7.7-1.7.9-2.6.6C9.4 15.9 4.1 10.6 2.5 6.1c-.3-.9-.1-1.9.6-2.6l1.4-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>

        <div class="content-view">
        <div class="info-view" id="infoView">
          <div class="info-cards" id="infoCards"></div>
          <div class="hero-photo-zone">
            <div class="blob b1"></div>
            <div class="blob b2"></div>
            <img class="hero-photo" id="heroPhoto" alt="" style="display:none" />
            <div class="hero-avatar-fallback" id="heroFallback"></div>
          </div>
        </div>

        <div class="thread-view" id="threadView"></div>
      </div>

      <div class="hide-info-row">
        <img src="assets/Show Info.svg" alt="Show Info" class="info-icon" />
        <button class="hide-info-btn" id="toggleInfo">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 7l4-4 4 4M2 10l4-4 4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Hide Info
        </button>
        <img src="assets/Show Info.svg" alt="Show Info" class="info-icon" />
      </div>
      </div>
    </div>

    <div class="composer-wrap">
      <div class="composer">
        <input type="text" id="input" placeholder="Ask Me anything" />
        <button class="send-btn" id="sendBtn">
          Send
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </main>
  </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
